name: AppLocker
options:
  bundleIdPrefix: com.pangtong
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: "2ZNZRXNPWQ"
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_CFBundleDisplayName: "应用锁"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_PREVIEWS: YES

targets:
  AppLocker:
    type: application
    platform: iOS
    sources:
      - path: AppLocker
    settings:
      base:
        INFOPLIST_FILE: AppLocker/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.pangtong.applocker
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsMCSH: NO
    entitlements:
      com.apple.developer.family-controls: true
      com.apple.security.application-groups:
        - group.com.pangtong.applocker
    dependencies:
      - target: AppLockerTests
        embed: false

  AppLockerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AppLockerTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pangtong.applocker.tests
        TEST_TARGET_NAME: AppLocker
