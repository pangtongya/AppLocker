name: AppLocker
options:
  bundleIdPrefix: com.pangtong
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: "2ZNZRXNPWQ"
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_CFBundleDisplayName: "应用锁"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_PREVIEWS: YES

targets:
  AppLocker:
    type: application
    platform: iOS
    sources:
      - path: AppLocker
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: AppLocker/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.pangtong.applocker
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
    entitlements:
      path: AppLocker/AppLocker.entitlements

  AppLockerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AppLockerTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pangtong.applocker.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AppLocker.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AppLocker"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFO_PLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: ""
    dependencies:
      - target: AppLocker
